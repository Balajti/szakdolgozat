version: 1
backend:
  phases:
    build:
      commands:
        - npm install --cache .npm --prefer-offline
        - cd amplify && npm install && cd ..
        # AWS_APP_ID and AWS_BRANCH are provided automatically by Amplify Hosting,
        # so this build spec works on any account/app without editing.
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
        # Expose the Gemini key to the Next.js server runtime (used by /api/translate).
        # Set GEMINI_API_KEY under App settings -> Environment variables.
        - env | grep -e GEMINI_API_KEY >> .env.production || true
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
